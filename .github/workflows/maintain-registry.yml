# Registry maintenance, twice weekly (Mon+Thu 06:00 UTC; Florian, 2026-07-08). Cron enabled 2026-07-05 alongside the
# news sweep after Task 5 acceptance.
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN repo secret (claude setup-token)
# and the Claude GitHub App installed on this repo.

name: maintain-registry

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1,4"

concurrency:
  group: data-writes
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  maintain:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # The agent must never see a push-capable token; the commit step
          # injects GH_TOKEN into the remote URL explicitly.
          persist-credentials: false
          fetch-depth: 1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve ledger claims (deterministic, pre-agent)
        # Resolves matured calibration claims via scripts/snr/ledger.ts,
        # records the strikes/credits they imply, and writes promotion
        # suggestions to signals_suggestions.json. Claims needing judgment
        # are listed in this step's log for Florian / the agent.
        run: bun scripts/resolve-claims.ts

      - name: Deterministic registry enrichment (null-fill from LL2/CelesTrak/GCAT)
        run: bun scripts/enrich-registry.ts

      - name: Registry v2 LL2 enrichment (alternates to respect the free-tier rate limit)
        # enrich-registry (3 reqs) + enrich-ll2 (~6) + enrich-incidents (<=8)
        # together can exceed LL2's ~15 req/hr free tier, so the two v2
        # enrichers alternate: vehicle specs on the Monday run, incident
        # events on Thursday. workflow_dispatch picks by the same rule
        # (current UTC weekday).
        run: |
          if [ "$(date -u +%u)" -le 3 ]; then
            bun scripts/enrich/enrich-ll2.ts
          else
            bun scripts/enrich/enrich-incidents.ts
          fi

      - name: Run the registry maintenance agent
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md (Registry rules) and prompts/maintain-registry.md
            in full, then execute the maintenance procedure exactly:
            consume src/data/registry-candidates.json first, then update
            factual fields on existing profiles only, every change with a
            fresh source URL and as_of date; touch nothing outside
            src/data/registry/, public/data/orbits/facilities.json, and
            the crossfeed queue file. Do not commit or push; the workflow
            handles that.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 80
            --allowedTools "Bash(bun run build),Bash(ls:*),Read,Write(./src/data/registry/**),Edit(./src/data/registry/**),Write(./public/data/orbits/facilities.json),Edit(./public/data/orbits/facilities.json),Write(./src/data/registry-candidates.json),Edit(./src/data/registry-candidates.json),WebFetch,WebSearch"

      # The load-bearing control: whatever the agent did, the working tree
      # may only differ under the registry run's data paths (the same set
      # the commit step stages). Anything else fails the job here, before
      # build and push.
      - name: Diff-scope gate (agent output confined to registry data paths)
        run: bun scripts/check-run-diff.ts registry

      - name: Build must pass before any commit
        run: bun run build

      - name: Commit registry changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Claude action swaps git credentials for its own short-lived
          # app token; point the remote back at the workflow token to push.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git diff --quiet -- src/data/registry public/data/orbits/facilities.json src/data/source_ledger.json src/data/signals_suggestions.json src/data/registry-candidates.json; then
            echo "No registry or ledger changes; nothing to commit."
            exit 0
          fi
          git config user.name "mcc-registry-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/registry public/data/orbits/facilities.json src/data/source_ledger.json src/data/signals_suggestions.json src/data/registry-candidates.json
          git commit -m "registry: maintenance update ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # main may have moved during the run; registry commits touch only
          # data files, so a rebase is clean or fails loudly.
          git pull --rebase origin main
          git push
