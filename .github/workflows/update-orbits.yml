# Orbits data refresh, every 12 hours, offset from the news sweeps.
# Fully deterministic (no agent): fetches CelesTrak element sets and the
# Launch Library 2 spaceport stats into public/data/orbits/, recomputes
# sats_active_verified on the registry constellation profiles from the
# fresh element sets, gates on the full build, and commits.
# ORBITS_SPEC.md 5.1/5.2 are the contract.
#
# Politeness: CelesTrak updates at most every 2 hours and asks users not
# to poll faster; LL2's free tier allows 15 requests/hour and this run
# needs about 7. Both scripts back off on errors and keep previous files
# on failure, so a bad upstream day degrades to stale data, never to a
# broken build.

name: update-orbits

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4,16 * * *"

concurrency:
  group: data-writes
  cancel-in-progress: false

permissions:
  contents: write
  # Single-job workflow: this is the scope of the failure-alert step only.
  issues: write

jobs:
  refresh:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch orbital elements (CelesTrak)
        run: bun scripts/orbits/fetch-elements.ts

      - name: Recompute verified fleet counts from element sets
        run: bun scripts/compute-fleet-counts.ts

      - name: Fetch spaceports (Launch Library 2)
        run: bun scripts/orbits/fetch-spaceports.ts

      - name: Fetch HUD stats (Launch Library 2 + SATCAT)
        run: bun scripts/orbits/fetch-stats.ts

      - name: Build must pass before any commit
        run: bun run build

      - name: Commit data refresh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git diff --quiet -- public/data/orbits src/data/registry/constellations; then
            echo "No orbits data changes; nothing to commit."
            exit 0
          fi
          git config user.name "mcc-orbits-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/orbits src/data/registry/constellations
          git commit -m "orbits: data refresh ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # main may have moved during the run; these commits touch only
          # data files, so a rebase is clean or fails loudly.
          git pull --rebase origin main
          git push

      # Alerting (plan Phase 5, should-fix 1): failures land in a single
      # reusable ops issue, deduped by exact title, instead of vanishing
      # into the Actions tab.
      - name: File ops issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "ops: update-orbits scheduled run failing"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          number=$(gh issue list -R "${{ github.repository }}" --state open --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$number" ]; then
            gh issue comment "$number" -R "${{ github.repository }}" --body "Another failing run: $RUN_URL"
          else
            gh issue create -R "${{ github.repository }}" --title "$TITLE" \
              --body "Scheduled run failed: $RUN_URL"$'\n\n'"This issue is the ops alert channel for this workflow; further failures comment here (deduped by title). Close it once the cause is fixed."
          fi
