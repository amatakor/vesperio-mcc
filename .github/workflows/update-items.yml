# News sweep. Cron enabled 2026-07-05 after Task 5 acceptance: four
# supervised sweeps, zero factual errors, Florian signed off on every
# published item.
#
# Launch cadence (2026-07-08): twice daily. The deterministic harvester
# (scripts/harvest.ts) runs before the agent and fills
# src/data/candidates.json from every feed-capable source, so scheduled
# runs walk the FULL source list; the old 14-source soft-launch
# allowlist is retired. The sweep window is the full gap since the last
# sweep (the harvester queues entries back to lastSweep minus 48h).
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN repo secret (claude setup-token)
# and the Claude GitHub App installed on this repo.

name: update-items

on:
  workflow_dispatch:
    inputs:
      source_filter:
        description: >-
          Comma-separated source names to fetch. Empty = the full
          source list (normal scheduled behavior).
        required: false
        default: ""
      extra_instructions:
        description: >-
          One-off instructions appended to the sweep prompt (e.g. a
          backfill window). Leave empty for normal runs.
        required: false
        default: ""
      force_deep:
        description: >-
          Set to "1" to force a deep sweep (7-day window, full signals
          pass, widened discovery). Normally automatic after 2
          consecutive zero-add sweeps.
        required: false
        default: ""
      harvest_window_days:
        description: >-
          Explicit harvest window in days back from now (positive
          integer). Wins over both normal and deep windows; for
          backfill runs. Empty = automatic.
        required: false
        default: ""
  schedule:
    - cron: "0 5,17 * * *"   # launch cadence: twice daily, 05:00/17:00 UTC

concurrency:
  group: data-writes
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  sweep:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # The agent must never see a push-capable token; the commit step
          # injects GH_TOKEN into the remote URL explicitly.
          persist-credentials: false
          fetch-depth: 1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Harvest feed sources into the candidate queue (deterministic, pre-agent)
        env:
          FORCE_DEEP: ${{ inputs.force_deep }}
          HARVEST_WINDOW_DAYS: ${{ inputs.harvest_window_days }}
        run: bun scripts/harvest.ts

      - name: Run the sweep agent
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md, SWEEP_MEMORY.md, and prompts/update-items.md in
            full, then execute the sweep procedure in prompts/update-items.md
            exactly. You draft sweep-draft.json and run
            `bun scripts/finalize-sweep.ts` to merge it; never edit
            src/data/items.json, held.json, state.json, or sources.json
            directly. Do not commit or push; the workflow handles that.

            Source filter for this run (comma-separated names, empty =
            the full source list): walk only these sources for
            DISCOVERY, and record source health only for them:
            "${{ inputs.source_filter }}".
            The deterministic harvester has already filled
            src/data/candidates.json from every feed-capable source;
            consume that queue first per prompts/update-items.md.
            The filter does NOT constrain the corroboration crawl or
            the signals pass; both run open-web per
            prompts/update-items.md.

            ${{ inputs.extra_instructions }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 150
            --allowedTools "Bash(bun scripts/sweep-context.ts),Bash(bun scripts/sweep-context.ts:*),Bash(bun scripts/signals-context.ts),Bash(bun scripts/signals-context.ts:*),Bash(bun scripts/finalize-sweep.ts),Bash(bun scripts/finalize-sweep.ts:*),Read,Write(./sweep-draft.json),Edit(./sweep-draft.json),Write(./SWEEP_MEMORY.md),Edit(./SWEEP_MEMORY.md),WebFetch,WebSearch"

      # The load-bearing control: whatever the agent did, the working tree
      # may only differ under the sweep's data paths. Any touch on
      # .github/, scripts/, prompts/, CLAUDE.md, signals.json, or src code
      # fails the job here, before build and push.
      - name: Diff-scope gate (agent output confined to sweep data paths)
        run: bun scripts/check-run-diff.ts sweep

      - name: Every run must log a sweep entry (zero-add runs included)
        run: |
          if git diff --quiet -- src/data/state.json; then
            echo "::error::The sweep agent finished without writing a sweep entry."
            echo "::error::Policy: even zero-add runs log their result via finalize-sweep."
            exit 1
          fi

      - name: Harvest item artwork (og:image or licensed stock)
        run: bun scripts/fetch-thumbs.ts

      - name: Build must pass before any commit
        run: bun run build

      - name: Commit feed changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Claude action swaps git credentials for its own short-lived
          # app token; point the remote back at the workflow token to push.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          rm -f sweep-draft.json
          if git diff --quiet -- src/data SWEEP_MEMORY.md && git diff --quiet -- public/img/items && [ -z "$(git status --porcelain public/img/items)" ]; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          counts=$(python3 -c "
          import json
          s = json.load(open('src/data/state.json'))['sweeps']
          e = s[-1] if s else {'added': 0, 'updated': 0, 'held': 0, 'at': ''}
          ts = e['at'][:16].replace('T', ' ')
          print(f\"{e['added']} new, {e['updated']} updated, {e['held']} held ({ts} UTC)\")
          ")
          git config user.name "mcc-sweep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data SWEEP_MEMORY.md public/img/items
          git commit -m "ingest: $counts"
          # main may have moved during the run (dev merges land while the
          # agent sweeps). Sweep commits touch only data files, so a rebase
          # is clean; a real conflict fails loudly and merges nothing.
          git pull --rebase origin main
          git push
