# News sweep. Cron enabled 2026-07-05 after Task 5 acceptance: four
# supervised sweeps, zero factual errors, Florian signed off on every
# published item.
#
# TEMPORARY (2026-07-06): running HOURLY during the first few days to
# gather scoring/signals data for engine tuning. REVERT TO TWICE DAILY
# AT LAUNCH by restoring the commented `0 5,17 * * *` line in `schedule`
# below and removing the hourly line.
#
# Scheduled runs currently use the cautious source set below (soft
# launch per Florian's 2b decision); remove the fallback list in
# SCHEDULED_SOURCES to go to the full source list.
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN repo secret (claude setup-token)
# and the Claude GitHub App installed on this repo.

name: update-items

env:
  SCHEDULED_SOURCES: "Planet Labs, Planet Labs IR, ICEYE, Rocket Lab, BlackSky IR, European Spaceflight, SpaceNews, Launch Library 2 (TheSpaceDevs), SEC EDGAR 8-K feed: PL, SEC EDGAR 8-K feed: BKSY, SEC EDGAR 8-K feed: RKLB, SEC EDGAR 8-K feed: SATL, SEC EDGAR 8-K feed: SPIR, SEC EDGAR 8-K feed: ASTS"

on:
  workflow_dispatch:
    inputs:
      source_filter:
        description: >-
          Comma-separated source names to fetch. Empty = the scheduled
          default set (SCHEDULED_SOURCES above).
        required: false
        default: ""
      extra_instructions:
        description: >-
          One-off instructions appended to the sweep prompt (e.g. a
          backfill window). Leave empty for normal runs.
        required: false
        default: ""
  schedule:
    # Tuning period: hourly at :17 (top-of-hour is GitHub's most congested
    # slot and drops runs, so offset). Restore the twice-daily line below
    # at launch.
    - cron: "17 * * * *"
    # - cron: "0 5,17 * * *"   # launch cadence: twice daily, 05:00/17:00 UTC

concurrency:
  group: data-writes
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  sweep:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run the sweep agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md, SWEEP_MEMORY.md, and prompts/update-items.md in
            full, then execute the sweep procedure in prompts/update-items.md
            exactly. You draft sweep-draft.json and run
            `bun scripts/finalize-sweep.ts` to merge it; never edit
            src/data/items.json, held.json, state.json, or sources.json
            directly. Do not commit or push; the workflow handles that.

            Source filter for this run (comma-separated names): walk
            only these sources for DISCOVERY, and record source health
            only for them:
            "${{ inputs.source_filter || env.SCHEDULED_SOURCES }}".
            The filter does NOT constrain the corroboration crawl or
            the signals pass; both run open-web per
            prompts/update-items.md.

            ${{ inputs.extra_instructions }}
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Bash(bun:*),Bash(curl:*),Read,Write,Edit,WebFetch,WebSearch"

      - name: Every run must log a sweep entry (zero-add runs included)
        run: |
          if git diff --quiet -- src/data/state.json; then
            echo "::error::The sweep agent finished without writing a sweep entry."
            echo "::error::Policy: even zero-add runs log their result via finalize-sweep."
            exit 1
          fi

      - name: Harvest item artwork (og:image or licensed stock)
        run: bun scripts/fetch-thumbs.ts

      - name: Build must pass before any commit
        run: bun run build

      - name: Commit feed changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Claude action swaps git credentials for its own short-lived
          # app token; point the remote back at the workflow token to push.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          rm -f sweep-draft.json
          if git diff --quiet -- src/data SWEEP_MEMORY.md && git diff --quiet -- public/img/items && [ -z "$(git status --porcelain public/img/items)" ]; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          counts=$(python3 -c "
          import json
          s = json.load(open('src/data/state.json'))['sweeps']
          e = s[-1] if s else {'added': 0, 'updated': 0, 'held': 0, 'at': ''}
          ts = e['at'][:16].replace('T', ' ')
          print(f\"{e['added']} new, {e['updated']} updated, {e['held']} held ({ts} UTC)\")
          ")
          git config user.name "mcc-sweep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data SWEEP_MEMORY.md public/img/items
          git commit -m "ingest: $counts"
          # main may have moved during the run (dev merges land while the
          # agent sweeps). Sweep commits touch only data files, so a rebase
          # is clean; a real conflict fails loudly and merges nothing.
          git pull --rebase origin main
          git push
