# News sweep. Cron enabled 2026-07-05 after Task 5 acceptance: four
# supervised sweeps, zero factual errors, Florian signed off on every
# published item.
#
# Launch cadence (2026-07-08): twice daily. The deterministic harvester
# (scripts/harvest.ts) runs before the agent and fills
# src/data/candidates.json from every feed-capable source, so scheduled
# runs walk the FULL source list; the old 14-source soft-launch
# allowlist is retired. The sweep window is the full gap since the last
# sweep (the harvester queues entries back to lastSweep minus 48h).
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN repo secret (claude setup-token)
# and the Claude GitHub App installed on this repo.

name: update-items

on:
  workflow_dispatch:
    inputs:
      source_filter:
        description: >-
          Comma-separated source names to fetch. Empty = the full
          source list (normal scheduled behavior).
        required: false
        default: ""
      extra_instructions:
        description: >-
          One-off instructions appended to the sweep prompt (e.g. a
          backfill window). Leave empty for normal runs.
        required: false
        default: ""
      force_deep:
        description: >-
          Set to "1" to force a deep sweep (7-day window, full signals
          pass, widened discovery). Normally automatic after 2
          consecutive zero-add sweeps.
        required: false
        default: ""
      harvest_window_days:
        description: >-
          Explicit harvest window in days back from now (positive
          integer). Wins over both normal and deep windows; for
          backfill runs. Empty = automatic.
        required: false
        default: ""
  schedule:
    # FALLBACK ONLY (Florian, 2026-07-13). The PRIMARY trigger is the
    # Cloudflare Worker cron (infra/sweep-trigger/), which calls the
    # dispatch API at exactly 05:15/17:15 UTC: GitHub's shared scheduler
    # fired this repo's morning crons 2h+ late or dropped them outright
    # (2026-07-12 and -13), and no off-minute choice dodges a backlogged
    # queue. This late cron only exists so a broken Worker cannot silence
    # the sweep; the guard job below skips it when the primary already
    # swept, so it never costs a duplicate agent run. The daily
    # health-check dead-man's switch alerts when BOTH trigger paths fail.
    - cron: "45 6,18 * * *"

concurrency:
  group: data-writes
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  actions: read
  # Single-job workflow: this is the scope of the failure-alert step only.
  issues: write

jobs:
  # Freshness guard for the fallback cron: a scheduled run is skipped when
  # a sweep already landed in the last 3 hours (the Worker-dispatched run
  # for this slot). Manual and API dispatches always run: workflow_dispatch
  # IS the primary trigger's event, and a human dispatching twice means it.
  guard:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Skip the fallback when the primary trigger already swept
        id: decide
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "dispatch event: always runs"
            exit 0
          fi
          age=$(python3 - <<'EOF'
          import json, datetime
          last = json.load(open("src/data/state.json"))["lastSweep"]
          dt = datetime.datetime.fromisoformat(last.replace("Z", "+00:00"))
          print(int((datetime.datetime.now(datetime.timezone.utc) - dt).total_seconds()))
          EOF
          )
          if [ "$age" -lt 10800 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "fallback skipped: last sweep ${age}s ago (< 3h), the primary trigger covered this slot"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "fallback engaged: last sweep ${age}s ago, the primary trigger missed this slot"
          fi

  sweep:
    needs: guard
    if: github.repository == 'amatakor/vesperio-mcc' && needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    # Two agent attempts fit (retry design, Florian 2026-07-12): a deep
    # sweep runs ~26 min; harvest + build + prerender bookend it.
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # The agent must never see a push-capable token; the commit step
          # injects GH_TOKEN into the remote URL explicitly.
          persist-credentials: false
          fetch-depth: 1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Harvest feed sources into the candidate queue (deterministic, pre-agent)
        env:
          FORCE_DEEP: ${{ inputs.force_deep }}
          HARVEST_WINDOW_DAYS: ${{ inputs.harvest_window_days }}
        run: bun scripts/harvest.ts

      - name: Rotate sweep memory (mechanical, lossless, pre-agent)
        run: bun scripts/rotate-sweep-memory.ts

      # Retry design (Florian, 2026-07-12, after two one-off agent failures
      # in 24h): the sweep must not depend on a single agent attempt.
      # Snapshot the pre-agent tree (harvest + rotation changes); attempt 1
      # may fail without killing the job; a goal-state check (sweep entry
      # written AND diff confined to sweep data paths) decides whether a
      # clean-slate attempt 2 runs. The hard gates below are unchanged and
      # still guard whatever the last attempt produced.
      - name: Snapshot the pre-agent tree (retry baseline)
        run: |
          git diff > /tmp/pre-agent.patch || true
          git ls-files --others --exclude-standard > /tmp/pre-agent-untracked.txt || true

      - name: Run the sweep agent (attempt 1)
        id: sweep1
        continue-on-error: true
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # DIAGNOSTIC (2026-07-12, remove once the denial storm is solved):
          # the 05:41 dispatch died with 45/45 tool calls permission-denied
          # and the default output hides every denial reason. The prompt and
          # repo contain nothing secret; the transcript is the evidence.
          show_full_output: true
          prompt: |
            Read CLAUDE.md, SWEEP_MEMORY.md, and prompts/update-items.md in
            full, then execute the sweep procedure in prompts/update-items.md
            exactly. You draft sweep-draft.json and run
            `bun scripts/finalize-sweep.ts` to merge it; never edit
            src/data/items.json, held.json, state.json, or sources.json
            directly. Do not commit or push; the workflow handles that.

            Source filter for this run (comma-separated names, empty =
            the full source list): walk only these sources for
            DISCOVERY, and record source health only for them:
            "${{ inputs.source_filter }}".
            The deterministic harvester has already filled
            src/data/candidates.json from every feed-capable source;
            consume that queue first per prompts/update-items.md.
            The filter does NOT constrain the corroboration crawl or
            the signals pass; both run open-web per
            prompts/update-items.md.

            ${{ inputs.extra_instructions }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 150
            --disallowedTools "Task,Agent,TaskCreate,ScheduleWakeup"
            --allowedTools "Bash(bun scripts/sweep-context.ts),Bash(bun scripts/sweep-context.ts:*),Bash(bun scripts/signals-context.ts),Bash(bun scripts/signals-context.ts:*),Bash(bun scripts/candidates-context.ts),Bash(bun scripts/candidates-context.ts:*),Bash(bun scripts/fetch-list.ts),Bash(bun scripts/fetch-list.ts:*),Bash(bun scripts/finalize-sweep.ts),Bash(bun scripts/finalize-sweep.ts:*),Read,Write(./sweep-draft.json),Edit(./sweep-draft.json),Write(./SWEEP_MEMORY.md),Edit(./SWEEP_MEMORY.md),WebFetch,WebSearch"

      - name: Goal-state check (did attempt 1 deliver?)
        id: goal1
        run: |
          set -euo pipefail
          ok=true
          if git diff --quiet -- src/data/state.json; then
            echo "::warning::Attempt 1 ended without writing a sweep entry."
            ok=false
          elif ! bun scripts/check-run-diff.ts sweep; then
            echo "::warning::Attempt 1 touched paths outside the sweep data scope."
            ok=false
          fi
          echo "ok=$ok" >> "$GITHUB_OUTPUT"

      - name: Reset to the pre-agent tree (attempt 1 missed the goal)
        if: steps.goal1.outputs.ok != 'true'
        run: |
          set -euo pipefail
          git checkout -- .
          git clean -fd
          if [ -s /tmp/pre-agent.patch ]; then git apply /tmp/pre-agent.patch; fi

      - name: Run the sweep agent (attempt 2, clean slate)
        if: steps.goal1.outputs.ok != 'true'
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            NOTE: this is an automatic RETRY. A previous attempt in this same
            run failed to complete the sweep (it either wrote no sweep entry
            or strayed outside its permitted paths) and the working tree has
            been reset to the clean pre-sweep state. Run the full procedure
            from the beginning.

            Read CLAUDE.md, SWEEP_MEMORY.md, and prompts/update-items.md in
            full, then execute the sweep procedure in prompts/update-items.md
            exactly. You draft sweep-draft.json and run
            `bun scripts/finalize-sweep.ts` to merge it; never edit
            src/data/items.json, held.json, state.json, or sources.json
            directly. Do not commit or push; the workflow handles that.

            Source filter for this run (comma-separated names, empty =
            the full source list): walk only these sources for
            DISCOVERY, and record source health only for them:
            "${{ inputs.source_filter }}".
            The deterministic harvester has already filled
            src/data/candidates.json from every feed-capable source;
            consume that queue first per prompts/update-items.md.
            The filter does NOT constrain the corroboration crawl or
            the signals pass; both run open-web per
            prompts/update-items.md.

            ${{ inputs.extra_instructions }}
          claude_args: |
            --model claude-sonnet-5
            --max-turns 150
            --disallowedTools "Task,Agent,TaskCreate,ScheduleWakeup"
            --allowedTools "Bash(bun scripts/sweep-context.ts),Bash(bun scripts/sweep-context.ts:*),Bash(bun scripts/signals-context.ts),Bash(bun scripts/signals-context.ts:*),Bash(bun scripts/candidates-context.ts),Bash(bun scripts/candidates-context.ts:*),Bash(bun scripts/fetch-list.ts),Bash(bun scripts/fetch-list.ts:*),Bash(bun scripts/finalize-sweep.ts),Bash(bun scripts/finalize-sweep.ts:*),Read,Write(./sweep-draft.json),Edit(./sweep-draft.json),Write(./SWEEP_MEMORY.md),Edit(./SWEEP_MEMORY.md),WebFetch,WebSearch"

      # The load-bearing control: whatever the agent did, the working tree
      # may only differ under the sweep's data paths. Any touch on
      # .github/, scripts/, prompts/, CLAUDE.md, signals.json, or src code
      # fails the job here, before build and push.
      - name: Diff-scope gate (agent output confined to sweep data paths)
        run: bun scripts/check-run-diff.ts sweep

      - name: Every run must log a sweep entry (zero-add runs included)
        run: |
          if git diff --quiet -- src/data/state.json; then
            echo "::error::The sweep agent finished without writing a sweep entry."
            echo "::error::Policy: even zero-add runs log their result via finalize-sweep."
            exit 1
          fi

      - name: Stage item-artwork candidates (og:image + article figures, own sources only)
        run: bun scripts/fetch-thumbs.ts --collect

      # Sealed, bounded artwork judge (Florian, 2026-07-13): ranks each
      # item's staged candidates against a fixed editorial rubric. Read-only
      # plus ONE writable file; it cannot touch data, and on any failure
      # --apply falls back to the og-image-first manifest order (the
      # pre-judge behavior). Haiku: bounded classification, cheapest tier.
      - name: Judge artwork candidates
        continue-on-error: true
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            If the file .image-judge/manifest.json does not exist, do
            nothing and finish. Otherwise read it. For each entry in
            items[], view every candidate image file (paths are
            .image-judge/<file>) with the Read tool, then rank the
            candidates BEST FIRST as news-card artwork by exactly this
            rubric and nothing else: a real photograph of the story's
            subject beats any other real photograph, which beats concept
            art or renders, which beat abstract or stock-style graphics,
            which beat charts, diagrams, and logos. Then write
            .image-judge/ranking.json as one JSON object:
            {"<item-id>": {"order": ["<file>", ...], "reason": "<one short line>"}, ...}
            covering every item in the manifest, using only file names
            that appear in the manifest. Do nothing else.
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 40
            --disallowedTools "Task,Agent,TaskCreate,ScheduleWakeup"
            --allowedTools "Read,Write(./.image-judge/ranking.json)"

      - name: Apply judged artwork (falls back to og:image order, then licensed stock)
        run: bun scripts/fetch-thumbs.ts --apply

      - name: Build must pass before any commit
        run: bun run build

      - name: Commit feed changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Claude action swaps git credentials for its own short-lived
          # app token; point the remote back at the workflow token to push.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          rm -f sweep-draft.json
          if git diff --quiet -- src/data SWEEP_MEMORY.md SWEEP_MEMORY_ARCHIVE.md && git diff --quiet -- public/img/items && [ -z "$(git status --porcelain public/img/items)" ]; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          counts=$(python3 -c "
          import json
          s = json.load(open('src/data/state.json'))['sweeps']
          e = s[-1] if s else {'added': 0, 'updated': 0, 'held': 0, 'at': ''}
          ts = e['at'][:16].replace('T', ' ')
          print(f\"{e['added']} new, {e['updated']} updated, {e['held']} held ({ts} UTC)\")
          ")
          git config user.name "mcc-sweep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data SWEEP_MEMORY.md SWEEP_MEMORY_ARCHIVE.md public/img/items
          git commit -m "ingest: $counts"
          # main may have moved during the run (dev merges land while the
          # agent sweeps). Sweep commits touch only data files, so a rebase
          # is clean; a real conflict fails loudly and merges nothing.
          git pull --rebase origin main
          git push

      # Optional dead-man's-switch ping (healthchecks.io or similar). A
      # missing secret is a silent no-op; the daily health-check workflow
      # covers the same gap without any external service.
      - name: Heartbeat ping (optional, no-op without the secret)
        if: success()
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HEALTHCHECK_URL" ]; then
            curl -fsS -m 10 --retry 2 "$HEALTHCHECK_URL" > /dev/null || echo "heartbeat ping failed (non-fatal)"
          else
            echo "HEALTHCHECK_URL not set; skipping."
          fi

      # Alerting (plan Phase 5, should-fix 1): failures land in a single
      # reusable ops issue, deduped by exact title, instead of vanishing
      # into the Actions tab.
      - name: File ops issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "ops: update-items scheduled run failing"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          number=$(gh issue list -R "${{ github.repository }}" --state open --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$number" ]; then
            gh issue comment "$number" -R "${{ github.repository }}" --body "Another failing run: $RUN_URL"
          else
            gh issue create -R "${{ github.repository }}" --title "$TITLE" \
              --body "Scheduled run failed: $RUN_URL"$'\n\n'"This issue is the ops alert channel for this workflow; further failures comment here (deduped by title). Close it once the cause is fixed."
          fi
