# News sweep. INERT until Task 5 acceptance: manual trigger only.
# Do NOT enable the cron until two consecutive manual sweeps produce
# zero factual errors and zero rule violations (BUILD_PLAN.md Task 5).
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN repo secret (claude setup-token)
# and the Claude GitHub App installed on this repo.

name: update-items

on:
  workflow_dispatch:
    inputs:
      source_filter:
        description: >-
          Comma-separated source names to fetch (empty = all). Supervised
          runs use the reduced set below per BUILD_PLAN Task 5.
        required: false
        default: "Planet Labs, ICEYE, SpaceX, Rocket Lab, SEC EDGAR 8-K feed: PL, Launch Library 2 (TheSpaceDevs)"
  # Enable after Task 5 acceptance; 05:00 / 17:00 UTC per SETUP.md.
  # Scheduled runs have no source_filter and sweep the full source list.
  # schedule:
  #   - cron: "0 5,17 * * *"

concurrency:
  group: data-writes
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  sweep:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run the sweep agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md, SWEEP_MEMORY.md, and prompts/update-items.md in
            full, then execute the sweep procedure in prompts/update-items.md
            exactly. You draft sweep-draft.json and run
            `bun scripts/finalize-sweep.ts` to merge it; never edit
            src/data/items.json, held.json, state.json, or sources.json
            directly. Do not commit or push; the workflow handles that.

            Source filter for this run (comma-separated names; if empty,
            fetch every source with status verified or unverified):
            "${{ inputs.source_filter }}". When a filter is set, fetch
            only the named sources and record source health only for them.
          claude_args: |
            --model claude-sonnet-5
            --allowedTools "Bash(bun:*),Bash(curl:*),Read,Write,Edit,WebFetch,WebSearch"

      - name: Harvest item artwork (og:image or licensed stock)
        run: bun scripts/fetch-thumbs.ts

      - name: Build must pass before any commit
        run: bun run build

      - name: Commit feed changes (skip on zero-activity sweeps)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The Claude action swaps git credentials for its own short-lived
          # app token; point the remote back at the workflow token to push.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          rm -f sweep-draft.json
          if git diff --quiet -- src/data SWEEP_MEMORY.md && git diff --quiet -- public/img/items && [ -z "$(git status --porcelain public/img/items)" ]; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          counts=$(python3 -c "
          import json
          s = json.load(open('src/data/state.json'))['sweeps']
          e = s[-1] if s else {'added': 0, 'updated': 0, 'held': 0, 'at': ''}
          ts = e['at'][:16].replace('T', ' ')
          print(f\"{e['added']} new, {e['updated']} updated, {e['held']} held ({ts} UTC)\")
          ")
          if echo "$counts" | grep -q "^0 new, 0 updated, 0 held"; then
            echo "Zero-activity sweep; per policy, no feed commit."
            exit 0
          fi
          git config user.name "mcc-sweep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data SWEEP_MEMORY.md public/img/items
          git commit -m "ingest: $counts"
          # main may have moved during the run (dev merges land while the
          # agent sweeps). Sweep commits touch only data files, so a rebase
          # is clean; a real conflict fails loudly and merges nothing.
          git pull --rebase origin main
          git push
