# Dead-man's switch (plan Phase 5, should-fix 2): the per-run failure
# alerts catch runs that fail; this daily check catches runs that stop
# happening at all. It fails, and files the ops issue, when state.json's
# lastSweep is older than twice the sweep interval (24h).
#
# 09:00 UTC: 4h after the morning sweep, so a single failed sweep stays
# below the threshold (its own alert covers it) and two consecutive
# missed sweeps trip this one.

name: health-check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: read
  issues: write

jobs:
  heartbeat:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Sweep heartbeat must be fresh
        run: bun scripts/check-heartbeat.ts

      - name: File ops issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "ops: sweep heartbeat stale (scheduled sweeps stopped)"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          number=$(gh issue list -R "${{ github.repository }}" --state open --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$number" ]; then
            gh issue comment "$number" -R "${{ github.repository }}" --body "Heartbeat still stale: $RUN_URL"
          else
            gh issue create -R "${{ github.repository }}" --title "$TITLE" \
              --body "state.json lastSweep is older than 24h: the scheduled sweeps have stopped landing on main. Check the Actions tab for disabled workflows or expired tokens. Run: $RUN_URL"
          fi
