name: update-stocks

on:
  schedule:
    # Daily after US market close (22:30 UTC).
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  # Single-job workflow: this is the scope of the failure-alert step only.
  issues: write

concurrency:
  group: data-writes
  cancel-in-progress: false

jobs:
  stocks:
    if: github.repository == 'amatakor/vesperio-mcc'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Fetch daily closes for listed registry entities
        run: bun scripts/fetch-stocks.ts
      - name: Commit refreshed series
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "mcc-stocks-bot"
          git config user.email "actions@github.com"
          git add public/data/stocks/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "stocks: daily close refresh"
          # main may have moved during the run; stock commits touch only
          # data files, so a rebase is clean or fails loudly.
          git pull --rebase origin main
          git push

      # Alerting (plan Phase 5, should-fix 1): failures land in a single
      # reusable ops issue, deduped by exact title, instead of vanishing
      # into the Actions tab.
      - name: File ops issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "ops: update-stocks scheduled run failing"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          number=$(gh issue list -R "${{ github.repository }}" --state open --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -1)
          if [ -n "$number" ]; then
            gh issue comment "$number" -R "${{ github.repository }}" --body "Another failing run: $RUN_URL"
          else
            gh issue create -R "${{ github.repository }}" --title "$TITLE" \
              --body "Scheduled run failed: $RUN_URL"$'\n\n'"This issue is the ops alert channel for this workflow; further failures comment here (deduped by title). Close it once the cause is fixed."
          fi
