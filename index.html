<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A machine-maintained tracker for the new space economy: Earth observation, connectivity, launch, and commercial human spaceflight."
    />
    <title>Vesperio</title>
    <!-- Favicon: the Negative Star mark (volt tile, black earth curve,
         square star). SVG for modern browsers, PNG fallback, 180px tile
         for iOS home screens. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Preload the two weights used unconditionally on first paint (mono
         body copy, sans display voice); every other weight is optional per
         page/element and stays lazy via @font-face font-display: swap. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/ibm-plex-mono-latin-400-normal.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/ibm-plex-sans-latin-200-normal.woff2"
      crossorigin
    />
    <!--canonical-->
    <!-- Theme before paint: default dark; "light" sets data-theme on <html>.
         Kept inline so a saved light theme never flashes dark. -->
    <script>
      try {
        if (localStorage.getItem("vesperio-theme") === "light")
          document.documentElement.setAttribute("data-theme", "light");
      } catch (e) {}
    </script>
    <!-- The feed is held at opacity:0 until the JS masonry packs it (see
         .cards in index.css); reveal it for clients that never run that JS. -->
    <noscript>
      <style>
        .cards {
          opacity: 1 !important;
        }
      </style>
    </noscript>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
